<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Primary SEO -->
		<meta name="description" content="Ambar UI — 45+ open-source Svelte 5 components built with Tailwind CSS v4. Includes charts, real-time streaming chart, sidebar, dialogs, inputs and more. Copy-paste or npm install." />
		<meta name="keywords" content="svelte components, svelte 5, svelte ui library, tailwind css v4, svelte charts, svelte sidebar, svelte dialog, svelte ui kit, component library, open source svelte, sveltekit components, realtime chart svelte, candlestick chart, svelte design system, ui components svelte 5" />
		<meta name="author" content="Ambar UI" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://ambarui.vercel.app" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://ambarui.vercel.app" />
		<meta property="og:title" content="Ambar UI — Svelte 5 Component Library" />
		<meta property="og:description" content="45+ open-source Svelte 5 components with Tailwind CSS v4. Charts, Sidebar, Realtime streaming, and more. Free forever." />
		<meta property="og:image" content="https://ambarui.vercel.app/og.png" />
		<meta property="og:site_name" content="Ambar UI" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://ambarui.vercel.app" />
		<meta name="twitter:title" content="Ambar UI — Svelte 5 Component Library" />
		<meta name="twitter:description" content="45+ open-source Svelte 5 components with Tailwind CSS v4. Charts, Sidebar, Realtime streaming, and more." />
		<meta name="twitter:image" content="https://ambarui.vercel.app/og.png" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
